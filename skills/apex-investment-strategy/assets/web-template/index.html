<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Apex资产动量研究与AI解读软件</title>
    <style>
      :root {
        color-scheme: light dark;
        --apple-blue: #007aff;
        --apple-green: #34c759;
        --apple-orange: #ff9500;
        --apple-red: #ff3b30;
        --bg-primary: #ffffff;
        --bg-grouped: #f2f2f7;
        --bg-secondary: #ffffff;
        --label-primary: #000000;
        --label-secondary: rgba(60, 60, 67, 0.68);
        --label-tertiary: rgba(60, 60, 67, 0.42);
        --separator: rgba(60, 60, 67, 0.22);
        --shadow: rgba(0, 0, 0, 0.08);
        --accent: var(--apple-blue);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --apple-blue: #0a84ff;
          --apple-green: #30d158;
          --apple-orange: #ff9f0a;
          --apple-red: #ff453a;
          --bg-primary: #000000;
          --bg-grouped: #1c1c1e;
          --bg-secondary: #2c2c2e;
          --label-primary: #ffffff;
          --label-secondary: rgba(235, 235, 245, 0.7);
          --label-tertiary: rgba(235, 235, 245, 0.45);
          --separator: rgba(84, 84, 88, 0.65);
          --shadow: rgba(0, 0, 0, 0.35);
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100dvh;
        background: var(--bg-grouped);
        color: var(--label-primary);
        font-family:
          -apple-system,
          BlinkMacSystemFont,
          "SF Pro Text",
          "SF Pro Display",
          "PingFang SC",
          "Hiragino Sans GB",
          "Microsoft YaHei",
          sans-serif;
      }

      button,
      a {
        min-height: 44px;
      }

      .shell {
        width: min(1120px, calc(100% - 32px));
        margin: 0 auto;
        padding: 32px 0 48px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 24px;
      }

      .title-group {
        min-width: 0;
      }

      h1 {
        margin: 0;
        font-size: clamp(28px, 4vw, 34px);
        line-height: 1.2;
        letter-spacing: 0;
      }

      .subtitle {
        margin: 6px 0 0;
        color: var(--label-secondary);
        font-size: 15px;
        line-height: 1.45;
      }

      .status-pill {
        display: inline-flex;
        align-items: center;
        min-height: 36px;
        padding: 0 12px;
        border: 1px solid var(--separator);
        border-radius: 999px;
        background: var(--bg-secondary);
        color: var(--label-secondary);
        font-size: 13px;
        white-space: nowrap;
        box-shadow: 0 8px 24px var(--shadow);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(12, 1fr);
        gap: 16px;
      }

      .panel {
        grid-column: span 12;
        border: 1px solid var(--separator);
        border-radius: 18px;
        background: var(--bg-secondary);
        box-shadow: 0 12px 32px var(--shadow);
        overflow: hidden;
      }

      .panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        min-height: 56px;
        padding: 16px 18px;
        border-bottom: 1px solid var(--separator);
      }

      h2 {
        margin: 0;
        font-size: 17px;
        line-height: 1.3;
      }

      .panel-body {
        padding: 18px;
      }

      .metric-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 12px;
      }

      .metric {
        min-height: 88px;
        padding: 14px;
        border: 1px solid var(--separator);
        border-radius: 14px;
        background: color-mix(in srgb, var(--bg-secondary) 84%, var(--bg-grouped));
      }

      .metric-label {
        color: var(--label-secondary);
        font-size: 12px;
        line-height: 1.35;
      }

      .metric-value {
        margin-top: 8px;
        font-size: 24px;
        font-variant-numeric: tabular-nums;
        line-height: 1.15;
        overflow-wrap: anywhere;
      }

      .span-8 {
        grid-column: span 8;
      }

      .span-4 {
        grid-column: span 4;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
      }

      th,
      td {
        padding: 12px 8px;
        border-bottom: 1px solid var(--separator);
        text-align: left;
        vertical-align: top;
      }

      th {
        color: var(--label-secondary);
        font-weight: 600;
      }

      tr:last-child td {
        border-bottom: none;
      }

      .number {
        font-variant-numeric: tabular-nums;
      }

      .muted {
        color: var(--label-secondary);
      }

      .notice {
        margin-top: 16px;
        padding: 14px;
        border-radius: 14px;
        background: color-mix(in srgb, var(--apple-orange) 12%, var(--bg-secondary));
        color: var(--label-secondary);
        font-size: 13px;
        line-height: 1.5;
      }

      .brief-text {
        margin: 0;
        color: var(--label-primary);
        font-size: 14px;
        line-height: 1.6;
      }

      .brief-text h3,
      .brief-text h4 {
        margin: 0 0 8px;
        line-height: 1.35;
      }

      .brief-text h3 {
        font-size: 18px;
      }

      .brief-text h4 {
        margin-top: 18px;
        font-size: 15px;
      }

      .brief-text p,
      .brief-text ul {
        margin: 0 0 12px;
      }

      .brief-text ul {
        padding-left: 18px;
      }

      @media (max-width: 760px) {
        .shell {
          width: min(100% - 24px, 1120px);
          padding-top: 20px;
        }

        .topbar {
          align-items: flex-start;
          flex-direction: column;
        }

        .span-8,
        .span-4 {
          grid-column: span 12;
        }

        .panel-header {
          align-items: flex-start;
          flex-direction: column;
        }

        table {
          display: block;
          overflow-x: auto;
          white-space: nowrap;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="title-group">
          <h1>Apex资产动量研究与AI解读软件</h1>
          <p class="subtitle">由本地研究工作区生成的静态报告。</p>
        </div>
        <div class="status-pill" id="status-pill">仅研究用途</div>
      </header>

      <section class="grid">
        <article class="panel span-8">
          <div class="panel-header">
            <h2>当前信号</h2>
            <span class="muted" id="signal-date"></span>
          </div>
          <div class="panel-body">
            <div class="metric-grid">
              <div class="metric">
                <div class="metric-label">当前标的</div>
                <div class="metric-value" id="selected-asset"></div>
              </div>
              <div class="metric">
                <div class="metric-label">触发原因</div>
                <div class="metric-value" id="signal-reason"></div>
              </div>
              <div class="metric">
                <div class="metric-label">动量广度</div>
                <div class="metric-value" id="breadth"></div>
              </div>
            </div>
            <div class="notice" id="disclaimer"></div>
          </div>
        </article>

        <article class="panel span-4">
          <div class="panel-header">
            <h2>回测摘要</h2>
          </div>
          <div class="panel-body">
            <div class="metric-grid">
              <div class="metric">
                <div class="metric-label">年化收益率</div>
                <div class="metric-value" id="cagr"></div>
              </div>
              <div class="metric">
                <div class="metric-label">最大回撤</div>
                <div class="metric-value" id="mdd"></div>
              </div>
              <div class="metric">
                <div class="metric-label">调仓次数</div>
                <div class="metric-value" id="turnover"></div>
              </div>
            </div>
          </div>
        </article>

        <article class="panel span-4">
          <div class="panel-header">
            <h2>目标权重</h2>
          </div>
          <div class="panel-body">
            <table>
              <thead>
                <tr>
                  <th>标的</th>
                  <th>权重</th>
                </tr>
              </thead>
              <tbody id="weights"></tbody>
            </table>
          </div>
        </article>

        <article class="panel span-8">
          <div class="panel-header">
            <h2>纸面调仓测算</h2>
            <span class="muted">本地偏离表</span>
          </div>
          <div class="panel-body">
            <table>
              <thead>
                <tr>
                  <th>标的</th>
                  <th>方向</th>
                  <th>金额</th>
                  <th>数量</th>
                  <th>参考价</th>
                </tr>
              </thead>
              <tbody id="trades"></tbody>
            </table>
          </div>
        </article>

        <article class="panel span-12">
          <div class="panel-header">
            <h2>AI 研究解读</h2>
            <span class="muted" id="ai-brief-status">可选解读层</span>
          </div>
          <div class="panel-body">
            <div class="brief-text" id="ai-brief-text"></div>
            <div class="notice">
              AI 解读内容仅由本地研究文件生成，用于研究说明，不构成投资建议或交易指令。
            </div>
          </div>
        </article>
      </section>
    </main>

    <script>
      const researchPacket = __ACTION_JSON__;
      const momentumSummary = __SUMMARY_JSON__;
      const aiBrief = __AI_BRIEF_JSON__;

      const assetNames = {
        hs300: "沪深300",
        sse50: "上证50",
        csi500: "中证500",
        csi_div: "中证红利",
        chinext: "创业板",
        bse50: "北证50",
        consumer: "消费",
        healthcare: "医药",
        financials: "金融",
        infotech: "信息技术",
        military: "军工",
        newenergy: "新能源",
        realestate: "房地产",
        semiconductor: "半导体",
        nonferrous: "有色金属",
        sp500: "标普500",
        nasdaq100: "纳指100",
        cash: "现金",
      };
      const statusLabels = {
        research_only: "仅研究用途",
        ai_generated: "已生成",
      };
      const reasonLabels = {
        fallback: "触发兜底规则",
        momentum_winner: "动量胜出",
      };
      const sideLabels = {
        buy: "买入",
        sell: "卖出",
      };
      const displayAsset = (asset) => assetNames[asset] || asset || "无数据";
      const displayStatus = (status) => statusLabels[status] || status || "仅研究用途";
      const escapeHtml = (value) =>
        String(value ?? "").replace(/[&<>"']/g, (char) => (
          { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char]
        ));

      const renderBriefMarkdown = (markdown) => {
        const parts = [];
        let listOpen = false;
        const closeList = () => {
          if (listOpen) {
            parts.push("</ul>");
            listOpen = false;
          }
        };

        String(markdown || "")
          .split(/\r?\n/)
          .forEach((rawLine) => {
            const line = rawLine.trim();
            if (!line) {
              closeList();
              return;
            }
            if (line.startsWith("- ")) {
              if (!listOpen) {
                parts.push("<ul>");
                listOpen = true;
              }
              parts.push(`<li>${escapeHtml(line.slice(2))}</li>`);
              return;
            }

            closeList();
            if (line.startsWith("## ")) {
              parts.push(`<h4>${escapeHtml(line.slice(3))}</h4>`);
            } else if (line.startsWith("# ")) {
              parts.push(`<h3>${escapeHtml(line.slice(2))}</h3>`);
            } else if (line.startsWith("*") && line.endsWith("*")) {
              parts.push(`<p class="muted"><em>${escapeHtml(line.slice(1, -1))}</em></p>`);
            } else {
              parts.push(`<p>${escapeHtml(line)}</p>`);
            }
          });

        closeList();
        return parts.join("");
      };

      const fmtPct = (value) =>
        typeof value === "number"
          ? new Intl.NumberFormat("zh-CN", { style: "percent", maximumFractionDigits: 2 }).format(value)
          : "无数据";
      const fmtNum = (value) =>
        typeof value === "number"
          ? new Intl.NumberFormat("zh-CN", { maximumFractionDigits: 2 }).format(value)
          : "无数据";

      document.getElementById("status-pill").textContent = displayStatus(researchPacket.status);
      document.getElementById("signal-date").textContent = researchPacket.signal_date || "";
      document.getElementById("selected-asset").textContent = displayAsset(researchPacket.signal?.selected_asset);
      document.getElementById("signal-reason").textContent =
        reasonLabels[researchPacket.signal?.reason] || researchPacket.signal?.reason || "无数据";
      document.getElementById("breadth").textContent = fmtPct(researchPacket.signal?.breadth);
      document.getElementById("disclaimer").textContent = researchPacket.disclaimer || "";
      document.getElementById("cagr").textContent = fmtPct(momentumSummary.cagr);
      document.getElementById("mdd").textContent = fmtPct(momentumSummary.max_drawdown);
      document.getElementById("turnover").textContent = fmtNum(momentumSummary.turnover_events);

      const weightsBody = document.getElementById("weights");
      Object.entries(researchPacket.target_weights || {}).forEach(([asset, weight]) => {
        const row = document.createElement("tr");
        row.innerHTML = `<td>${displayAsset(asset)}</td><td class="number">${fmtPct(weight)}</td>`;
        weightsBody.appendChild(row);
      });

      const tradesBody = document.getElementById("trades");
      const paperRebalanceRows = researchPacket.paper_rebalance_rows || researchPacket.recommended_trades || [];
      if (paperRebalanceRows.length === 0) {
        const row = document.createElement("tr");
        row.innerHTML = '<td colspan="5" class="muted">当前没有超过最小金额阈值的纸面调仓项。</td>';
        tradesBody.appendChild(row);
      } else {
        paperRebalanceRows.forEach((trade) => {
          const row = document.createElement("tr");
          row.innerHTML = `
            <td>${displayAsset(trade.asset_id)}</td>
            <td>${sideLabels[trade.side] || trade.side}</td>
            <td class="number">${fmtNum(trade.estimated_value)}</td>
            <td class="number">${fmtNum(trade.estimated_quantity)}</td>
            <td class="number">${fmtNum(trade.reference_price)}</td>
          `;
          tradesBody.appendChild(row);
        });
      }

      const aiBriefStatus = document.getElementById("ai-brief-status");
      const aiBriefText = document.getElementById("ai-brief-text");
      if (aiBrief?.brief_markdown) {
        aiBriefStatus.textContent = `${displayStatus(aiBrief.status || "ai_generated")} · ${aiBrief.model || "模型"}`;
        aiBriefText.innerHTML = renderBriefMarkdown(aiBrief.brief_markdown);
      } else {
        aiBriefStatus.textContent = "未生成";
        aiBriefText.textContent = "运行 AI 解读命令后，这里会显示本地研究简报。";
      }
    </script>
  </body>
</html>
